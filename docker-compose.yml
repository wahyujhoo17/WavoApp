version: "3.8"

services:
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: wavo-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
      POSTGRES_DB: wavo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: wavo-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  minio:
    image: minio/minio:latest
    container_name: wavo-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minio_root
      MINIO_ROOT_PASSWORD: minio_password
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: always

  api:
    build:
      context: .
      dockerfile: apps/monolith/Dockerfile
    container_name: wavo-monolith
    ports:
      - "4000:4000"
      - "3001:3001"
    environment:
      NODE_ENV: development
      PORT: "4000"
      # Database points to postgres service in this compose
      DATABASE_URL: postgresql://postgres:postgres_password@postgres:5432/wavo?schema=public
      DATABASE_POOL_SIZE: "20"
      # Redis service
      REDIS_URL: redis://redis:6379
      # MinIO service (object storage)
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: minio_root
      MINIO_SECRET_KEY: minio_password
      MINIO_BUCKET: wavo-storage
      MINIO_USE_SSL: "false"
      # Application / Auth defaults (override in production)
      FRONTEND_URL: http://localhost:3001
      ADMIN_EMAIL: admin@wavo.dev
      API_URL: http://localhost:4000
      JWT_PRIVATE_KEY: wavo_secure_session_encryption_key_32_bytes_long_secret
      JWT_PUBLIC_KEY: wavo_secure_session_encryption_key_32_bytes_long_secret
      ENCRYPTION_KEY: wavo_secure_session_encryption_key_32_bytes_long_secret
      BCRYPT_ROUNDS: "12"
    depends_on:
      - postgres
      - redis
      - minio
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
