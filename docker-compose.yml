version: "3.8"

services:
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: wavo-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
      POSTGRES_DB: wavo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: wavo-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  minio:
    image: minio/minio:latest
    container_name: wavo-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minio_root
      MINIO_ROOT_PASSWORD: minio_password
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: always

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: wavo-api
    ports:
      - "4000:4000"
    env_file:
      - ./apps/api/.env
    depends_on:
      - postgres
      - redis
      - minio
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
