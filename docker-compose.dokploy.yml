version: '3.9'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
      POSTGRES_DB: wavo
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: minio_root
      MINIO_ROOT_PASSWORD: minio_password
    command: server /data
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      # Replace these values with Dokploy Secrets in the UI before deploy
      DATABASE_URL: postgres://postgres:postgres_password@postgres:5432/wavo?schema=public
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: minio_root
      MINIO_SECRET_KEY: minio_password
      NODE_ENV: production
      PORT: 4000
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - redis
      - minio

  engine:
    build:
      context: ./apps/engine
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://api:4000
      NEXT_PUBLIC_WS_URL: ws://api:4000
      NODE_ENV: production
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
  minio_data:
